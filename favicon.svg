<svg xmlns="http://www.w3.org" viewBox="0 0 160 40">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bd65;stop-opacity:1" />
    </linearGradient>
  </defs>

  <style>
    text, .bat-part {
      font-family: 'Arial Black', sans-serif;
      font-weight: 900;
      fill: url(#grad);
      opacity: 0.15;
    }
    
    .char, .bat-group { animation: lightUp 2.8s infinite; }
    
    .char1 { animation-delay: 0s; }
    .char2 { animation-delay: 0.3s; }
    .char3 { animation-delay: 0.6s; }
    .char4 { animation-delay: 0.9s; }
    .char5 { animation-delay: 1.2s; }
    .bat-group { animation-delay: 1.5s; }

    @keyframes lightUp {
      0%, 18% { opacity: 1; filter: url(#glow); }
      35%, 100% { opacity: 0.15; filter: none; }
    }
  </style>

  <!-- Рамка -->
  <rect x="2" y="2" width="156" height="36" rx="10" stroke="#00ff88" stroke-width="1.2" fill="none" opacity="0.1" />

  <g transform="translate(12, 28)">
    <text x="0" font-size="22" class="char char1">B</text>
    <text x="20" font-size="22" class="char char2">A</text>
    <text x="40" font-size="22" class="char char3">B</text>
    <text x="60" font-size="22" class="char char4">L</text>
    <text x="80" font-size="22" class="char char5">O</text>
    
    <!-- Полная батарейка -->
    <g class="bat-group" transform="translate(110, -17)">
      <rect x="0" y="0" width="24" height="12" rx="2" stroke="url(#grad)" stroke-width="2" fill="none" class="bat-part" />
      <path d="M26 3 v6" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" class="bat-part" />
      <!-- Три деления заряда -->
      <rect x="3" y="3" width="4" height="6" fill="url(#grad)" class="bat-part" />
      <rect x="10" y="3" width="4" height="6" fill="url(#grad)" class="bat-part" />
      <rect x="17" y="3" width="4" height="6" fill="url(#grad)" class="bat-part" />
    </g>
  </g>
</svg>
