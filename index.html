<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>BABLO WEB4 WORLD – Genesis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
 <link rel="icon" type="image/gif" href="/favicon.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
 <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
 <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
 <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #020412;
      color: #f5f7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #03091b, #01020a 70%);
    }
    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud-top {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    #hud-top-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      pointer-events: none;
    }
    #timeline-year {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #9fffb9;
    }
    #timeline-title {
      font-size: 18px;
      font-weight: 600;
      text-align: right;
      max-width: 60%;
    }
    #timeline-bar {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      pointer-events: none;
    }
    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background-image: linear-gradient(90deg, #26f0a8, #1c9bff);
      box-shadow: 0 0 12px rgba(38, 240, 168, 0.6);
      transition: width 0.1s linear;
    }

    #hud-bottom {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 8px 18px;
      font-size: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #1fda88, #16a3ff);
      color: #020412;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 16px rgba(0, 255, 128, 0.4);
    }
    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #d4e6ff;
      box-shadow: none;
    }
    button.hidden {
      display: none;
    }

    #log-panel {
      position: absolute;
      left: 8px;
      bottom: 52px;
      right: 8px;
      max-height: 35vh;
      padding: 6px 10px;
      box-sizing: border-box;
      border-radius: 8px;
      background: radial-gradient(circle at bottom left, rgba(3, 24, 42, 0.9), rgba(2, 7, 20, 0.85));
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }
    #status-text {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
      pointer-events: none;
    }
    #log-list {
      flex: 1;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.25;
      pointer-events: auto;
    }
    .log-item {
      margin-bottom: 2px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    .log-year {
      color: #9fffb9;
      font-weight: 500;
      margin-right: 4px;
    }
    .log-text {
      opacity: 0.9;
    }

    #center-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
  
  #credits-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  perspective: 800px;
}

#credits-inner {
  position: absolute;
  left: 50%;
  bottom: -40vh;
  transform-style: preserve-3d;
  transform-origin: 50% 100%;
  color: #f5f7ff;
  font-family: "Courier New", monospace;
  text-align: center;
}

.credit-line {
  font-size: 16px;
  line-height: 1.4;
  margin-bottom: 10px;
  text-shadow: 0 0 6px rgba(0,0,0,0.8);
}

.credit-line.core {
  font-size: 22px;
  color: #00ffcc;
  text-shadow: 0 0 12px rgba(0,255,204,0.9);
}
 /* Основной слой для титров */
#credits-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  perspective: 1000px; /* Глубина для 3D */
  z-index: 10; /* Чтобы быть над канвасом */
}

/* Контейнер для строк */
#credits-inner {
  position: absolute;
  left: 50%;
  width: 80%;
  transform-style: preserve-3d;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Стиль каждой буквы (для эффекта кометы) */
.credit-line span {
  display: inline-block;
  transition: all 0.2s ease;
}

.comet-head {
  color: #00ffcc;
  text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
  font-weight: bold;
}

 
 /* Адаптация под мобильные устройства */
@media (max-width: 768px) {
  /* 1. Титры: делаем текст чуть меньше и шире область просмотра */
  .credit-line {
    font-size: 1.1rem; /* Уменьшаем шрифт, чтобы строки не переносились */
    margin-bottom: 0.8rem;
  }
  
  .credit-line.core {
    font-size: 1.5rem; /* Акцентная строка тоже чуть меньше */
  }

  #credits-inner {
    width: 95%; /* На мобилках используем почти всю ширину */
  }

  /* 2. Интерфейс (HUD): чтобы кнопки не перекрывали текст */
  #hud-top-row {
    flex-direction: column; /* Год и название друг под другом */
    align-items: flex-start;
    gap: 2px;
  }

  #timeline-title {
    max-width: 100%;
    font-size: 14px;
    text-align: left;
  }

  /* 3. Лог-панель: делаем компактнее */
  #log-panel {
    bottom: 60px; /* Поднимаем чуть выше над кнопками */
    max-height: 25vh;
  }

  /* 4. Кнопки: делаем крупнее, чтобы было удобно попадать пальцем */
  button {
    padding: 12px 24px;
    font-size: 14px;
  }
}

 </style>
</head>
<body>
  <div id="app">
  <canvas id="scene"></canvas>
    <div id="credits-layer"></div>

    <div id="hud-top">
      <div id="hud-top-row">
        <div id="timeline-year">−13 800 000 000</div>
        <div id="timeline-title">НАЖМИ START GENESIS</div>
      </div>
      <div id="timeline-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div id="log-panel">
      <div id="status-text">BABLO WEB4 WORLD · GENESIS READY</div>
      <div id="log-list"></div>
    </div>

    <div id="hud-bottom">
      <button id="primary-btn">START GENESIS</button>
      <button id="secondary-btn" class="secondary hidden">SPAWN BABLO</button>
    </div>

    <div id="center-title">BABLO WEB4 WORLD · GENESIS</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
