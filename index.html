<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>BABLO WEB4 WORLD – Genesis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #020412;
      color: #f5f7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 2fr 3fr;
      grid-template-areas:
        "header header"
        "timeline scene"
        "log log";
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(5, 10, 40, 0.9);
      border-radius: 8px;
      box-shadow: 0 0 24px rgba(0, 255, 128, 0.15);
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9fffb9;
    }
    header span {
      font-size: 12px;
      opacity: 0.8;
    }
    #timeline-panel {
      grid-area: timeline;
      background: radial-gradient(circle at top left, #0b102a 0, #020412 60%);
      border-radius: 8px;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }
    #scene-panel {
      grid-area: scene;
      background: radial-gradient(circle at top right, #071326 0, #020412 60%);
      border-radius: 8px;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #log-panel {
      grid-area: log;
      background: linear-gradient(to right, rgba(5, 18, 40, 0.96), rgba(3, 8, 24, 0.96));
      border-radius: 8px;
      padding: 8px 12px;
      box-sizing: border-box;
      font-size: 12px;
      line-height: 1.3;
      display: flex;
      flex-direction: column;
    }
    #status-text {
      font-size: 11px;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    #log-list {
      flex: 1;
      overflow-y: auto;
    }
    .log-item {
      margin-bottom: 2px;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    .log-year {
      color: #9fffb9;
      font-weight: 500;
      margin-right: 4px;
    }
    .log-text {
      opacity: 0.9;
    }

    #cosmos-canvas {
      width: 100%;
      height: 40%;
      border-radius: 8px;
      background: radial-gradient(circle at center, #051332, #01020b 70%);
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.12);
    }
    #timeline-bar {
      height: 6px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      position: relative;
    }
    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background-image: linear-gradient(90deg, #26f0a8, #1c9bff);
      box-shadow: 0 0 12px rgba(38, 240, 168, 0.6);
      transition: width 0.1s linear;
    }
    #timeline-year {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    #timeline-title {
      font-size: 20px;
      font-weight: 600;
      min-height: 28px;
    }

    #scene-container {
      flex: 1;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #031b24, #01040a 60%);
      box-shadow: inset 0 0 40px rgba(0, 255, 128, 0.18);
    }
    #world {
      width: 100%;
      height: 100%;
      display: block;
    }
    #main-planet {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6bffb3, #166b3f 70%);
      box-shadow: 0 0 40px rgba(0, 255, 128, 0.7);
    }
    #controls {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      align-items: center;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #1fda88, #16a3ff);
      color: #020412;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 16px rgba(0, 255, 128, 0.4);
    }
    button.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #d4e6ff;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>BABLO WEB4 WORLD – GENESIS</h1>
      <span>11 марта 2026 · Bablinovka Core · NEAR Web4</span>
    </header>

    <section id="timeline-panel">
      <canvas id="cosmos-canvas"></canvas>
      <div id="timeline-bar">
        <div id="progress-fill"></div>
      </div>
      <div id="timeline-year">−13 800 000 000</div>
      <div id="timeline-title">БОЛЬШОЙ ВЗРЫВ</div>
      <div id="controls">
        <button id="startGenesisBtn">GENESIS</button>
        <button id="spawnBtn" class="secondary">SPAWN BABLO</button>
        <span id="small-status" style="font-size:11px;opacity:0.7;">Готово к запуску симуляции…</span>
      </div>
    </section>

    <section id="scene-panel">
      <div id="scene-container">
        <canvas id="world"></canvas>
        <div id="main-planet"></div>
      </div>
    </section>

    <section id="log-panel">
      <div id="status-text">GENESIS READY · ждём старта таймлайна…</div>
      <div id="log-list"></div>
    </section>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
